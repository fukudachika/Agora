<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR体験</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; }
    model-viewer {
      width: 100%;
      height: 100vh;
      background-color: #eee;
    }
  </style>
</head>
<body>
  <model-viewer
    alt="ARキャラクター"
    src="untitled.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    shadow-intensity="1"
    camera-controls
    touch-action="pan-y">
  </model-viewer>
</body>
</html>
